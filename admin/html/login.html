<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | GlowMart</title>
    <link rel="stylesheet" href="../../css/login.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .admin-login-wrapper {
            width: 100%;
            max-width: 480px;
        }

        .login-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        /* Header Section */
        .login-header {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);
            padding: 40px 30px;
            text-align: center;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        .login-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .login-header::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -5%;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(20px); }
        }

        .logo-section {
            position: relative;
            z-index: 1;
            margin-bottom: 15px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 28px;
            font-weight: 700;
            backdrop-filter: blur(10px);
        }

        .login-header h1 {
            font-size: 2em;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .login-header p {
            font-size: 0.9em;
            opacity: 0.95;
            font-weight: 500;
        }

        /* Form Section */
        .login-form-section {
            padding: 40px 30px;
        }

        .admin-login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-weight: 600;
            color: #2c2c2c;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .input-group input:focus {
            outline: none;
            border-color: #ff6b6b;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.1);
        }

        .input-group input::placeholder {
            color: #aaa;
        }

        /* Password Toggle */
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 1.1em;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-wrapper {
            position: relative;
        }

        /* Submit Button */
        .login-submit-btn {
            padding: 14px 20px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
            position: relative;
            overflow: hidden;
        }

        .login-submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.4s ease;
        }

        .login-submit-btn:hover::before {
            left: 100%;
        }

        .login-submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
        }

        .login-submit-btn:active {
            transform: translateY(0);
        }

        /* Error Message */
        .login-error {
            padding: 12px 14px;
            background: #ffebee;
            color: #c62828;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: 500;
            border-left: 4px solid #c62828;
            display: none;
        }

        .login-error.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Demo Credentials */
        .demo-section {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #f0f0f0;
            text-align: center;
        }

        .demo-label {
            color: #888;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: block;
        }

        .demo-credentials {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 0.85em;
            color: #555;
        }

        .demo-credentials strong {
            color: #2c2c2c;
            font-weight: 600;
        }

        .demo-credentials p {
            margin: 4px 0;
        }

        /* Loading State */
        .login-submit-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .login-submit-btn.loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            top: 50%;
            left: 50%;
            margin-left: -8px;
            margin-top: -8px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                border-radius: 15px;
            }

            .login-header {
                padding: 30px 20px;
            }

            .login-form-section {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 1.6em;
            }

            .logo-icon {
                width: 50px;
                height: 50px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-login-wrapper">
        <div class="login-card">
            <!-- Header with Logo -->
            <div class="login-header">
                <div class="logo-section">
                    <div class="logo-icon">
                        <i class="fa fa-lock"></i>
                    </div>
                </div>
                <h1>Admin Portal</h1>
                <p>GlowMart Management System</p>
            </div>

            <!-- Login Form -->
            <div class="login-form-section">
                <form class="admin-login-form" method="POST">
                    <div class="input-group">
                        <label for="username">
                            <i class="fa fa-user" style="margin-right: 6px;"></i>Username
                        </label>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            placeholder="Enter your username" 
                            required
                            autocomplete="username"
                        >
                    </div>

                    <div class="input-group">
                        <label for="password">
                            <i class="fa fa-lock" style="margin-right: 6px;"></i>Password
                        </label>
                        <div class="password-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                placeholder="Enter your password" 
                                required
                                autocomplete="current-password"
                            >
                            <button type="button" class="password-toggle" id="passwordToggle">
                                <i class="fa fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="login-submit-btn">
                        <i class="fa fa-sign-in" style="margin-right: 8px;"></i>Sign In
                    </button>

                    <div class="login-error" id="loginError"></div>
                </form>

                <!-- Demo Credentials Section -->
                <div class="demo-section">
                    <span class="demo-label">Demo Credentials</span>
                    <div class="demo-credentials">
                        <p><strong>Username:</strong> admin</p>
                        <p><strong>Password:</strong> password</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../javascript/login.js"></script>
    <script>
        // Password visibility toggle
        const passwordToggle = document.getElementById('passwordToggle');
        const passwordInput = document.getElementById('password');

        if (passwordToggle) {
            passwordToggle.addEventListener('click', function(e) {
                e.preventDefault();
                const icon = this.querySelector('i');
                
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    passwordInput.type = 'password';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            });
        }

        // Show loading state on submit
        const form = document.querySelector('.admin-login-form');
        if (form) {
            form.addEventListener('submit', function() {
                const btn = this.querySelector('.login-submit-btn');
                if (btn) {
                    btn.classList.add('loading');
                    btn.disabled = true;
                }
            });
        }
    </script>
</body>
</html>
