<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - GlowMart</title>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/menu.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0px auto;
            padding: 20px;
        }

        .profile-card {
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .profile-header {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);
            padding: 40px 30px;
            text-align: center;
            color: #fff;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 50px;
        }

        .profile-header h1 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .profile-header p {
            opacity: 0.9;
            font-size: 0.95em;
        }

        .profile-content {
            padding: 40px 30px;
        }

        .profile-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #ff6b6b;
        }

        .info-label {
            font-weight: 700;
            color: #888;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: block;
        }

        .info-value {
            color: #333;
            font-size: 1.1em;
            font-weight: 600;
        }

        .profile-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 150px;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 0.95em;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #ff6b6b;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .back-link:hover {
            transform: translateX(-5px);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f0f0f0;
            border-top-color: #ff6b6b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <a href="../html/menu.html" class="nav-brand">
                <div class="logo-icon">GM</div>
                <span class="logo-text">GlowMart</span>
            </a>
        </div>
    </header>

    <div class="container">
        <a href="../html/menu.html" class="back-link">← Back to Shop</a>

        <div class="profile-card">
            <!-- Header -->
            <div class="profile-header">
                <div class="profile-avatar">👤</div>
                <h1 id="profileName">User</h1>
                <p id="profileEmail">user@example.com</p>
            </div>

            <!-- Content -->
            <div class="profile-content">
                <div class="loading" id="loadingState">
                    <div class="spinner"></div>
                    <p style="margin-top: 15px;">Loading profile...</p>
                </div>

                <div id="profileData" style="display: none;">
                    <div class="profile-info">
                        <div class="info-item">
                            <span class="info-label">Full Name</span>
                            <span class="info-value" id="infoName">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Email Address</span>
                            <span class="info-value" id="infoEmail">-</span>
                        </div>
                        
                    </div>

                    <div class="profile-actions">
                        <a href="edit-profile.html" class="btn btn-primary">✏️ Edit Profile</a>
                        <a href="order-history.html" class="btn btn-secondary">📦 Order History</a>
                        <a href="reviews.html" class="btn btn-secondary">⭐ My Reviews</a>
                        <a href="feedback.html" class="btn btn-secondary">💬 Send Feedback</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../javascript/menu.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetch('../php/fetch_user_profile.php')
                .then(res => res.json())
                .then(data => {
                    if (data && data.fullname) {
                        document.getElementById('profileName').textContent = data.fullname;
                        document.getElementById('profileEmail').textContent = data.email || 'No email';
                        document.getElementById('infoName').textContent = data.fullname;
                        document.getElementById('infoEmail').textContent = data.email || '-';

                        document.getElementById('loadingState').style.display = 'none';
                        document.getElementById('profileData').style.display = 'block';
                    }
                })
                .catch(err => {
                    document.getElementById('loadingState').innerHTML = '<p style="color: #d32f2f;">Error loading profile</p>';
                });
        });
    </script>
</body>
</html>
