<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reviews - GlowMart</title>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/menu.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0px auto;
            padding: 20px;
        }

        .page-header {
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 2em;
            color: #333;
            margin-bottom: 10px;
        }

        .page-header p {
            color: #888;
            font-size: 0.95em;
        }

        .review-card {
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin-bottom: 20px;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .review-product {
            font-weight: 700;
            color: #333;
            font-size: 1.1em;
        }

        .review-date {
            color: #888;
            font-size: 0.85em;
        }

        .review-rating {
            display: flex;
            gap: 4px;
            margin-bottom: 10px;
        }

        .star {
            color: #ffc107;
            font-size: 1.2em;
        }

        .review-text {
            color: #555;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .review-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
        }

        .btn-edit {
            background: #e3f2fd;
            color: #1976d2;
        }

        .btn-edit:hover {
            background: #bbdefb;
        }

        .btn-delete {
            background: #ffebee;
            color: #d32f2f;
        }

        .btn-delete:hover {
            background: #ffcdd2;
        }

        .empty-state {
            text-align: center;
            padding: 60px 30px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            color: #888;
        }

        .empty-icon {
            font-size: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .empty-state a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .empty-state a:hover {
            transform: translateY(-2px);
        }

        .review-form {
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .form-group label {
            font-weight: 700;
            color: #888;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group select,
        .form-group textarea {
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ff6b6b;
            box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .rating-input {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .rating-stars {
            display: flex;
            gap: 8px;
        }

        .rating-star-btn {
            background: none;
            border: none;
            font-size: 2em;
            cursor: pointer;
            color: #ddd;
            transition: all 0.2s ease;
        }

        .rating-star-btn:hover,
        .rating-star-btn.active {
            color: #ffc107;
            transform: scale(1.2);
        }

        .form-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 0.95em;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #ff6b6b;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .back-link:hover {
            transform: translateX(-5px);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f0f0f0;
            border-top-color: #ff6b6b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <a href="../html/menu.html" class="nav-brand">
                <div class="logo-icon">GM</div>
                <span class="logo-text">GlowMart</span>
            </a>
        </div>
    </header>

    <div class="container">
        <a href="profile.html" class="back-link">← Back to Profile</a>

        <div class="page-header">
            <h1>⭐ My Reviews</h1>
            <p>Share your experience with our products</p>
        </div>

        <!-- Add Review Form -->
        <div class="review-form" id="addReviewForm">
            <h3 style="margin-bottom: 20px; color: #333;">Write a Review</h3>
            <form id="reviewForm">
                <div class="form-group">
                    <label for="product">Select Product</label>
                    <select id="product" name="product" required>
                        <option value="">Choose a product from your orders...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Rating</label>
                    <div class="rating-stars" id="ratingStars">
                        <button type="button" class="rating-star-btn" data-rating="1">★</button>
                        <button type="button" class="rating-star-btn" data-rating="2">★</button>
                        <button type="button" class="rating-star-btn" data-rating="3">★</button>
                        <button type="button" class="rating-star-btn" data-rating="4">★</button>
                        <button type="button" class="rating-star-btn" data-rating="5">★</button>
                    </div>
                    <input type="hidden" id="rating" name="rating" value="5">
                </div>

                <div class="form-group">
                    <label for="reviewText">Your Review</label>
                    <textarea id="reviewText" name="reviewText" placeholder="Share your thoughts about this product..." required></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">📝 Submit Review</button>
                    <button type="reset" class="btn btn-secondary">Clear</button>
                </div>
            </form>
        </div>

        <div class="page-header">
            <h3>Your Reviews</h3>
        </div>

        <div id="reviewsContainer"></div>

        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-icon">⭐</div>
            <h2>No Reviews Yet</h2>
            <p>You haven't written any reviews yet. Share your experience!</p>
        </div>
    </div>

    <script src="../javascript/menu.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadReviews();
            setupRatingStars();
            loadOrderProducts();
            setupReviewForm();
        });

        function loadReviews() {
            fetch('../php/fetch_user_reviews.php')
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('reviewsContainer');
                    const emptyState = document.getElementById('emptyState');
                    const reviews = data.reviews || [];

                    if (reviews.length === 0) {
                        emptyState.style.display = 'block';
                        return;
                    }

                    container.innerHTML = reviews.map(review => `
                        <div class="review-card">
                            <div class="review-header">
                                <div>
                                    <div class="review-product">${review.product_name}</div>
                                    <div class="review-date">${new Date(review.review_date).toLocaleDateString()}</div>
                                </div>
                            </div>
                            <div class="review-rating">
                                ${'★'.repeat(review.rating)}<span style="color: #ddd;">${'★'.repeat(5 - review.rating)}</span>
                            </div>
                            <div class="review-text">${review.review_text}</div>
                            <div class="review-actions">
                                <button class="btn-small btn-delete" onclick="deleteReview(${review.review_id})">🗑️ Delete</button>
                            </div>
                        </div>
                    `).join('');
                })
                .catch(err => {
                    console.error('Error loading reviews:', err);
                    document.getElementById('emptyState').style.display = 'block';
                });
        }

        function loadOrderProducts() {
            fetch('../php/fetch_user_orders.php')
                .then(res => res.json())
                .then(data => {
                    const orders = data.orders || [];
                    console.log(data.orders[0]);
                    if (orders.length > 0) {
                        const productSelect = document.getElementById('product');
                        const options = orders.map(order => `
                            <option value="${order.order_id}-${order.order_id}">
                                ${order.products} (Order #${order.order_id})
                            </option>
                        `).join('');
                        productSelect.innerHTML = '<option value="">Choose a product from your orders...</option>' + options;
                    }
                })
                .catch(err => console.error('Error loading products:', err));
        }

        function setupRatingStars() {
            const stars = document.querySelectorAll('.rating-star-btn');
            const ratingInput = document.getElementById('rating');

            stars.forEach(star => {
                star.addEventListener('click', function(e) {
                    e.preventDefault();
                    const rating = this.dataset.rating;
                    ratingInput.value = rating;

                    stars.forEach(s => s.classList.remove('active'));
                    for (let i = 0; i < rating; i++) {
                        stars[i].classList.add('active');
                    }
                });
            });

            // Set initial 5 star rating
            for (let i = 0; i < 5; i++) {
                stars[i].classList.add('active');
            }
        }

        function setupReviewForm() {
            const form = document.getElementById('reviewForm');
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                const productValue = document.getElementById('product').value;
                if (!productValue) {
                    alert('✕ Please select a product');
                    return;
                }

                const [orderId, productId] = productValue.split('-');
                const rating = document.getElementById('rating').value;
                const reviewText = document.getElementById('reviewText').value;

                const formData = new FormData();
                formData.append('order_id', orderId);
                formData.append('product_id', productId);
                formData.append('rating', rating);
                formData.append('review_text', reviewText);

                fetch('../php/submit_review.php', {
                    method: 'POST',
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        alert('✓ Review submitted successfully!');
                        form.reset();
                        setupRatingStars();
                        loadReviews();
                        loadOrderProducts();
                    } else {
                        alert('✕ Error: ' + (data.error || 'Could not submit review'));
                    }
                })
                .catch(err => {
                    console.error('Error:', err);
                    alert('✕ Error submitting review');
                });
            });
        }

        function editReview(reviewId) {
            alert('Edit review #' + reviewId + ' - To be implemented');
        }

        function deleteReview(reviewId) {
            if (confirm('Are you sure you want to delete this review?')) {
                const formData = new FormData();
                formData.append('review_id', reviewId);

                fetch('../php/delete_review.php', {
                    method: 'POST',
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        alert('✓ Review deleted');
                        loadReviews();
                    } else {
                        alert('✕ Error: ' + (data.error || 'Could not delete review'));
                    }
                })
                .catch(err => {
                    console.error('Error:', err);
                    alert('✕ Error deleting review');
                });
            }
        }
    </script>
</body>
</html>
