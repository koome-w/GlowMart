<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History - GlowMart</title>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/menu.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0px auto;
            padding: 20px;
        }

        .page-header {
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 2em;
            color: #333;
            margin-bottom: 10px;
        }

        .page-header p {
            color: #888;
            font-size: 0.95em;
        }

        .orders-card {
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .orders-table {
            width: 100%;
            border-collapse: collapse;
        }

        .orders-table thead {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);
            color: #fff;
        }

        .orders-table th {
            padding: 16px;
            text-align: left;
            font-weight: 700;
            font-size: 0.9em;
        }

        .orders-table td {
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        .orders-table tbody tr:hover {
            background: #f8f9fa;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 700;
            text-align: center;
            min-width: 100px;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-processing {
            background: #cfe2ff;
            color: #084298;
        }

        .status-shipped {
            background: #d1ecf1;
            color: #0c5460;
        }

        .status-delivered {
            background: #d4edda;
            color: #155724;
        }

        .status-completed {
            background: #d4edda;
            color: #155724;
        }

        .status-cancelled {
            background: #f8d7da;
            color: #721c24;
        }

        .order-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s ease;
        }

        .btn-view {
            background: #e3f2fd;
            color: #1976d2;
        }

        .btn-view:hover {
            background: #bbdefb;
        }

        .btn-review {
            background: #fff3e0;
            color: #f57c00;
        }

        .btn-review:hover {
            background: #ffe0b2;
        }

        .empty-state {
            text-align: center;
            padding: 60px 30px;
            color: #888;
        }

        .empty-icon {
            font-size: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .empty-state a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .empty-state a:hover {
            transform: translateY(-2px);
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #ff6b6b;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .back-link:hover {
            transform: translateX(-5px);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f0f0f0;
            border-top-color: #ff6b6b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .orders-table th,
            .orders-table td {
                padding: 12px 8px;
                font-size: 0.9em;
            }

            .btn-small {
                padding: 4px 8px;
                font-size: 0.75em;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <a href="../html/menu.html" class="nav-brand">
                <div class="logo-icon">GM</div>
                <span class="logo-text">GlowMart</span>
            </a>
        </div>
    </header>

    <div class="container">
        <a href="profile.html" class="back-link">← Back to Profile</a>

        <div class="page-header">
            <h1>📦 Order History</h1>
            <p>View all your orders and track delivery status</p>
        </div>

        <div class="orders-card">
            <div class="loading" id="loadingState">
                <div class="spinner"></div>
                <p style="margin-top: 15px;">Loading orders...</p>
            </div>

            <div id="ordersData" style="display: none;">
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Date</th>
                            <th>Products</th>
                            <th>Total</th>
                            <th>Delivery Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                        <!-- Orders will be loaded here -->
                    </tbody>
                </table>
            </div>

            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-icon">📦</div>
                <h2>No Orders Yet</h2>
                <p>You haven't placed any orders yet. Start shopping now!</p>
                <a href="../html/menu.html">Continue Shopping</a>
            </div>
        </div>
    </div>

    <script src="../javascript/menu.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetch('../php/fetch_user_orders.php')
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById('ordersTableBody');
                    const loadingState = document.getElementById('loadingState');
                    const ordersData = document.getElementById('ordersData');
                    const emptyState = document.getElementById('emptyState');

                    const orders = data.orders || [];

                    if (orders.length === 0) {
                        loadingState.style.display = 'none';
                        emptyState.style.display = 'block';
                        return;
                    }

                    tbody.innerHTML = orders.map(order => `
                        <tr>
                            <td><strong>#${order.order_id}</strong></td>
                            <td>${order.order_date ? order.order_date.split(' ')[0] : '-'}</td>
                            <td>${order.products || '-'}</td>
                            <td><strong>KES ${parseFloat(order.total_amount).toFixed(2)}</strong></td>
                            <td>${order.delivery_date ? order.delivery_date.split(' ')[0] : '-'}</td>
                            <td><span class="status-badge status-${order.status.toLowerCase()}">${order.status}</span></td>
                            <td>
                                <div class="order-actions">
                                    <button class="btn-small btn-view" onclick="viewOrder(${order.order_id})">👁️ View</button>
                                    <a href="reviews.html?order=${order.order_id}" class="btn-small btn-review">⭐ Review</a>
                                </div>
                            </td>
                        </tr>
                    `).join('');

                    loadingState.style.display = 'none';
                    ordersData.style.display = 'block';
                })
                .catch(err => {
                    document.getElementById('loadingState').innerHTML = '<p style="color: #d32f2f;">Error loading orders</p>';
                    console.error('Error:', err);
                });
        });

        function viewOrder(orderId) {
            alert('Order #' + orderId + ' details - To be implemented');
        }
    </script>
</body>
</html>
